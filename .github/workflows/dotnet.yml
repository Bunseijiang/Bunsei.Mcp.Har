name: .NET

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and publish Native AOT
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Restore
        run: dotnet restore .\Bunsei.Mcp.Har\Bunsei.Mcp.Har.csproj

      - name: Build
        run: dotnet build .\Bunsei.Mcp.Har\Bunsei.Mcp.Har.csproj --configuration Release --no-restore

      - name: Publish win-x64 Native AOT
        run: dotnet publish .\Bunsei.Mcp.Har\Bunsei.Mcp.Har.csproj --configuration Release --runtime win-x64 --no-restore --output .\artifacts\publish\win-x64

      - name: Upload win-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bunsei.Mcp.Har-win-x64
          path: .\artifacts\publish\win-x64
          if-no-files-found: error
